document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>\n        <span style=\"font-size:13px;font-weight:700;letter-spacing:2px;color:#ff8cc4\">✿ ABOUT ME<\u002Fspan>\n        <span style=\"font-size:12px;color:#ff8cc4;animation:twinkle 2.4s infinite\">✦<\u002Fspan>\n        <div style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(255,140,196,.5),transparent)\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:54px;align-items:flex-start;flex-wrap:wrap\">\n        <div style=\"flex:1;min-width:280px;animation-name:reveal;animation-fill-mode:both;animation-timeline:view();animation-range:entry 0% cover 26%\">\n          <h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:36px;line-height:1.2;color:#fff\">A little about me 🌸<\u002Fh2>\n          <p style=\"margin-top:18px;font-size:16px;line-height:1.75;color:rgba(255,255,255,.82)\">I'm Isha — a full-stack engineer who enjoys building products from idea to deployment. My favorite part of software is working across the stack: designing intuitive frontends, building reliable backends, and bringing everything together in the cloud.<\u002Fp>\n          <p style=\"margin-top:14px;font-size:16px;line-height:1.75;color:rgba(255,255,255,.82)\" data-comment-anchor=\"956d1ae398-p\">I care about clean code, thoughtful systems, and software that's enjoyable to use. I'm always exploring new technologies, whether that's a web framework, an embedded project, or a machine learning experiment.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-top:24px\">\n            <span style=\"display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);padding:9px 16px;border-radius:22px;font-weight:600;font-size:13.5px;color:#ffd0e4\">📍 Based in Ontario,Toronto<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);padding:9px 16px;border-radius:22px;font-weight:600;font-size:13.5px;color:#ffd0e4\">💼 Open to work<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);padding:9px 16px;border-radius:22px;font-weight:600;font-size:13.5px;color:#ffd0e4\">☕ Coffee &amp; clean diffs<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex-shrink:0;width:300px;animation-name:reveal;animation-fill-mode:both;animation-timeline:view();animation-range:entry 0% cover 24%\">\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n            <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:20px;text-align:center;transition:transform .2s\" style-hover=\"transform:translateY(-5px)\">\n              <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:34px;color:#ff8cc4\">5+<\u002Fdiv>\n              <div style=\"font-size:12.5px;font-weight:600;color:rgba(255,255,255,.7);margin-top:2px\">Years coding<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:20px;text-align:center;transition:transform .2s\" style-hover=\"transform:translateY(-5px)\">\n              <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:34px;color:#ff8cc4\">40+<\u002Fdiv>\n              <div style=\"font-size:12.5px;font-weight:600;color:rgba(255,255,255,.7);margin-top:2px\">Technologies<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:20px;text-align:center;transition:transform .2s\" style-hover=\"transform:translateY(-5px)\">\n              <div style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:34px;color:#ff8cc4\">∞<\u002Fdiv>\n              <div style=\"font-size:12.5px;font-weight:600;color:rgba(255,255,255,.7);margin-top:2px\">Curiosity<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:linear-gradient(135deg,#c41e6a,#8e1b5c);border-radius:20px;padding:20px;text-align:center;box-shadow:0 8px 20px rgba(196,30,106,.3);display:flex;align-items:center;justify-content:center\">\n              <div style=\"font-size:34px;animation:floaty 5s ease-in-out infinite\">🌷<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SKILLS (mauve) ============ -->\n  <section id=\"skills\" style=\"position:relative;overflow:hidden;background:linear-gradient(180deg,#ecd9e4,#e3cbd9);padding:90px 0\">\n    <span style=\"position:absolute;left:6%;top:12%;font-size:30px;color:rgba(196,30,106,.12)\">❀<\u002Fspan>\n    <span style=\"position:absolute;right:7%;top:20%;font-size:22px;color:rgba(196,30,106,.14);animation:floaty 7s ease-in-out infinite\">✿<\u002Fspan>\n    <span style=\"position:absolute;left:10%;bottom:12%;font-size:14px;color:rgba(196,30,106,.4);animation:twinkle 3s infinite\">✦<\u002Fspan>\n    <div style=\"position:relative;max-width:1100px;margin:0 auto;padding:0 40px\">\n      <div style=\"text-align:center;margin-bottom:8px;animation-name:reveal;animation-fill-mode:both;animation-timeline:view();animation-range:entry 0% cover 30%\">\n        <span style=\"font-size:13px;font-weight:700;letter-spacing:2px;color:#c41e6a\">✿ SKILLS &amp; TECH STACK ✦<\u002Fspan>\n        <h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:40px;color:#3d0f2c;margin-top:4px\">My little toolbox 🧰<\u002Fh2>\n        <p style=\"margin-top:10px;font-size:15px;color:#7a4a63;max-width:520px;margin-left:auto;margin-right:auto\">Everything I reach for across the stack — frontend to cloud, data to devices.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:24px;margin-top:46px\">\n        <sc-for list=\"{{ skillGroups }}\" as=\"g\" hint-placeholder-count=\"7\">\n          <div style=\"background:#fff;border:1.5px solid #ecb6d2;border-radius:26px;padding:24px 26px;box-shadow:0 14px 34px rgba(108,20,68,.1);animation-name:reveal;animation-fill-mode:both;animation-timeline:view();animation-range:entry 0% cover 18%\">\n            <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px\">\n              <span style=\"font-size:22px\">{{ g.emoji }}<\u002Fspan>\n              <h3 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:20px;color:#a01457\">{{ g.title }}<\u002Fh3>\n              <div style=\"flex:1;height:1px;background:linear-gradient(90deg,#f0c2d8,transparent)\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:12px\">\n              <sc-for list=\"{{ g.items }}\" as=\"s\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#fff,#fdeef5);border:1.5px solid #f0c8dc;border-radius:16px;padding:11px 16px;font-weight:600;font-size:14px;color:#3d0f2c;transition:transform .18s,box-shadow .18s,border-color .18s\" style-hover=\"transform:translateY(-5px) scale(1.04);box-shadow:0 12px 24px rgba(196,30,106,.2);border-color:#e07db0\">\n                  <span style=\"width:26px;height:26px;flex-shrink:0;background-image:url({{ s.icon }});background-size:contain;background-position:center;background-repeat:no-repeat\"><\u002Fspan>\n                  <span>{{ s.name }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ EXPERIENCE + EDUCATION (dark wine) ============ -->\n  <section id=\"work\" style=\"position:relative;overflow:hidden;background:linear-gradient(160deg,#330d27 0%,#2a0a1f 50%,#3d0f2c 100%);background-size:200% 200%;animation:shift 22s ease infinite;padding:9 60,.18)\"><\u002Fdiv>\n            <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:20px 24px;backdrop-filter:blur(4px);transition:transform .2s,border-color .2s\" style-hover=\"transform:translateX(6px);border-color:rgba(255,140,196,.4)\">\n              <div style=\"display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;align-items:baseline\">\n                <h3 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:#fff\">{{ job.role }}<\u002Fh3>\n                <span style=\"font-weight:700;font-size:12.5px;color:#fff;background:linear-gradient(135deg,#c41e6a,#8e1b5c);padding:5px 13px;border-radius:16px\">{{ job.period }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-weight:600;font-size:14.5px;color:#ff8cc4;margin-top:4px\">{{ job.company }}<\u002Fdiv>\n              <p style=\"margin-top:10px;font-size:14.5px;line-height:1.65;color:rgba(255,255,255,.78)\">{{ job.desc }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:12px;margin:40px 0 26px;animation-name:reveal;animation-fill-mode:both;animation-timeline:view();animation-range:entry 0% cover 30%\">\n        <span style=\"font-size:13px;font-weight:700;letter-spacing:2px;color:#ff8cc4\">✿ EDUCATION<\u002Fspan>\n        <div style=\"flex:1;height:1px;background:linear-gradient(90deg,rgba(255,140,196,.5),transparent)\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px;padding-bottom:70px\">\n        <sc-for list=\"{{ education }}\" as=\"ed\" hint-placeholder-count=\"2\">\n          <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:22px;padding:24px;transition:transform .2s;animation-name:reveal;animation-fill-mode:both;animation-timeline:view();animation-range:entry 0% cover 24%\" style-hover=\"transform:translateY(-5px)\">\n            <div style=\"font-size:30px\">{{ ed.emoji }}<\u002Fdiv>\n            <h3 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:#fff;margin-top:10px\">{{ ed.degree }}<\u002Fh3>\n            <div style=\"font-weight:600;font-size:14px;color:#ff8cc4;margin-top:4px\">{{ ed.school }}<\u002Fdiv>\n            <div style=\"font-weight:600;font-size:12.5px;color:rgba(255,255,255,.6);margin-top:6px\">{{ ed.period }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PROJECTS (mauve, switchable) ============ -->\n  <section id=\"projects\" style=\"position:relative;overflow:hidden;background:linear-gradient(180deg,#e3cbd9,#ecd9e4);padding:90px 0\">\n    <span style=\"position:absolute;left:7%;top:10%;font-size:26px;color:rgba(196,30,106,.12);animation:floaty 8s ease-in-out infinite\">❀<\u002Fspan>\n    <span style=\"position:absolute;right:8%;bottom:14%;font-size:20px;color:rgba(196,30,106,.14)\">✿<\u002Fspan>\n    <span style=\"position:absolute;right:16%;top:14%;font-size:14px;color:rgba(196,30,106,.4);animation:twinkle 2.6s infinite\">✦<\u002Fspan>\n    <div style=\"position:relative;max-width:1100px;margin:0 auto;padding:0 40px\">\n      <div style=\"text-align:center;animation-name:reveal;animation-fill-mode:both;animation-timeline:view();animation-range:entry 0% cover 30%\">\n        <span style=\"font-size:13px;font-weight:700;letter-spacing:2px;color:#c41e6a\">✿ PROJECTS ✦<\u002Fspan>\n        <h2 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:40px;color:#3d0f2c;margin-top:4px\">Things I've made with love 💝<\u002Fh2>\n        <p style=\"margin-top:10px;font-size:15px;color:#7a4a63\">Pick a domain to see what I've built there.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- domain tabs -->\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:30px;animation-name:reveal;animation-fill-mode:both;animation-timeline:view();animation-range:entry 0% cover 26%\">\n        <sc-for list=\"{{ domains }}\" as=\"d\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ d.onClick }}\" style=\"{{ d.tabStyle }}\">\n            <span>{{ d.emoji }}<\u002Fspan><span>{{ d.label }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- upcoming state -->\n      <sc-if value=\"{{ isUpcoming }}\" hint-placeholder-val=\"{{ false }}\">\n        <div id=\"projGrid\" style=\"margin-top:34px;background:#fff;border:1.5px dashed #e07db0;border-radius:26px;padding:60px 40px;text-align:center;box-shadow:0 12px 30px rgba(108,20,68,.08)\">\n          <div style=\"font-size:54px;animation:floaty 5s ease-in-out infinite\">🌱<\u002Fdiv>\n          <h3 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:24px;color:#a01457;margin-top:14px\">{{ currentLabel }} projects are blooming soon<\u002Fh3>\n          <p style=\"margin-top:10px;font-size:15px;color:#7a4a63;max-width:420px;margin-left:auto;margin-right:auto\">I'm planting some lovely things in this space. Check back shortly — or peek at my other domains in the meantime! ✦<\u002Fp>\n          <a href=\"https://github.com/Isha-Das-06\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;margin-top:22px;background:linear-gradient(135deg,#c41e6a,#8e1b5c);color:#fff;font-weight:700;font-size:14px;padding:12px 26px;border-radius:26px;text-decoration:none;box-shadow:0 10px 22px rgba(196,30,106,.28)\" style-hover=\"transform:translateY(-3px)\">Visit my GitHub ↗<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- projects grid -->\n      <sc-if value=\"{{ hasProjects }}\" hint-placeholder-val=\"{{ true }}\">\n      <div id=\"projGrid\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:34px\">\n        <sc-for list=\"{{ currentProjects }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <div style=\"background:#fff;border:1.5px solid #ecb6d2;border-radius:24px;overflow:hidden;box-shadow:0 12px 30px rgba(108,20,68,.1);transition:transform .2s,box-shadow .2s\" style-hover=\"transform:translateY(-8px);box-shadow:0 24px 44px rgba(196,30,106,.22)\">\n            <div style=\"height:150px;background:repeating-linear-gradient(45deg,#fbe0ee,#fbe0ee 12px,#f6cce1 12px,#f6cce1 24px);display:flex;align-items:center;justify-content:center;position:relative\">\n              <span style=\"font-size:44px\">{{ p.emoji }}<\u002Fspan>\n              <span style=\"position:absolute;bottom:10px;right:12px;font-family:monospace;font-size:11px;color:#c41e6a;background:rgba(255,255,255,.85);padding:3px 8px;border-radius:8px\">project shot<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:20px\">\n              <h3 style=\"font-family:'Fredoka',sans-serif;font-weight:600;font-size:19px;color:#3d0f2c\">{{ p.title }}<\u002Fh3>\n              <p style=\"margin-top:8px;font-size:14px;line-height:1.6;color:#6b4257\">{{ p.desc }}<\u002Fp>\n              <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-top:14px\">\n                <sc-for list=\"{{ p.tags }}\" as=\"t\" hint-placeholder-count=\"3\">\n                  <span style=\"font-weight:600;font-size:11.5px;color:#a01457;background:#fbe0ee;padding:4px 11px;border-radius:14px\">{{ t }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:14px;margin-top:16px\">\n                <a href=\"{{ p.code }}\" target=\"_blank\" rel=\"noopener\" style=\"font-weight:700;font-size:13px;color:#c41e6a;text-decoration:none\">Code ↗<\u002Fa>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"text-align:center;margin-top:40px\">\n        <a href=\"Upcoming.dc.html\" style=\"display:inline-block;background:#fff;border:2px solid #e07db0;color:#c41e6a;font-weight:700;font-size:14.5px;padding:13px 28px;border-radius:30px;text-decoration:none\" style-hover=\"background:#fbe0ee\">See achievements &amp; more on the next page ✦<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ CONTACT ============ -->\n  <section id=\"contact\" style=\"position:relative;overflow:hidden;background:linear-gradient(125deg,#5e0f37,#8e1b5c 55%,#c2397d);background-size:200% 200%;animation:shift 16s ease infinite;padding:90px 40px;text-align:center\">\n    <span style=\"position:absolute;left:8%;top:18%;font-size:20px;color:rgba(255,225,238,.6);animation:floaty 5s ease-in-out infinite\">❀<\u002Fspan>\n    <span style=\"position:absolute;right:10%;top:24%;font-size:26px;animation:floaty 6s ease-in-out infinite 1s\">🌸<\u002Fspan>\n    <span style=\"position:absolute;left:16%;bottom:18%;font-size:14px;color:#fff;animation:twinkle 3s infinite\">✦<\u002Fspan>\n    <span style=\"position:absolute;right:18%;bottom:22%;font-size:18px;color:#ffd9ec;animation:twinkle 2.6s infinite .6s\">✧<\u002Fspan>\n    <div style=\"position:relative;max-width:640px;margin:0 auto\">\n      <h2 style=\"font-family:'Baloo 2',cursive;font-weight:800;font-size:48px;line-height:1.05;color:#fff\">Let's build something cute together ♡<\u002Fh2>\n      <p style=\"margin-top:16px;font-size:16px;line-height:1.6;color:rgba(255,255,255,.9)\">Got a role, a project, or just want to say hi? My inbox is always open.<\u002Fp>\n      <div style=\"display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:30px\">\n        <a href=\"mailto:i3das@uwaterloo.ca\" style=\"background:#fff;color:#c41e6a;font-weight:700;font-size:15px;padding:15px 30px;border-radius:30px;text-decoration:none;box-shadow:0 10px 24px rgba(0,0,0,.25)\" style-hover=\"transform:translateY(-3px)\">✉ i3das@uwaterloo.ca<\u002Fa>\n        <a href=\"Upcoming.dc.html\" style=\"border:2px solid rgba(255,255,255,.6);color:#fff;font-weight:700;font-size:15px;padding:13px 28px;border-radius:30px;text-decoration:none\" style-hover=\"background:rgba(255,255,255,.14)\">Socials &amp; newsletter ✦<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:16px;justify-content:center;margin-top:34px\">\n        <a href=\"https://github.com/Isha-Das-06\" target=\"_blank\" rel=\"noopener\" aria-label=\"GitHub\" style=\"width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;text-decoration:none\" style-hover=\"background:rgba(255,255,255,.3)\"><span style=\"width:22px;height:22px;background:url(&quot;f3f20527-2dd0-463b-8329-d35c38a48272&quot;) center/contain no-repeat\"><\u002Fspan><\u002Fa>\n        <a href=\"https://www.linkedin.com/in/isha-das-216966419/\" target=\"_blank\" rel=\"noopener\" aria-label=\"LinkedIn\" style=\"width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;text-decoration:none\" style-hover=\"background:rgba(255,255,255,.3)\"><span style=\"width:21px;height:21px;background:url(&quot;034ad23b-45cb-4e36-93ae-81e72c859e78&quot;) center/contain no-repeat;filter:brightness(0) invert(1)\"><\u002Fspan><\u002Fa>\n        <a href=\"mailto:i3das@uwaterloo.ca\" aria-label=\"Email\" style=\"width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:19px;line-height:1\" style-hover=\"background:rgba(255,255,255,.3)\">✉<\u002Fa>\n        <a href=\"https://x.com/IshaDas353830\" target=\"_blank\" rel=\"noopener\" aria-label=\"X\" style=\"width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;text-decoration:none\" style-hover=\"background:rgba(255,255,255,.3)\"><span style=\"width:20px;height:20px;background:url(&quot;966ca23f-540b-4b2e-b59c-28deb03728eb&quot;) center/contain no-repeat\"><\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"background:#2a0a1f;padding:26px 40px;text-align:center;color:rgba(255,255,255,.7);font-size:13px;font-weight:500\">\n    <span style=\"font-family:'Baloo 2',cursive;font-weight:700;color:#ffd9ec\">✿ isha das<\u002Fspan> · made with 💕 and lots of pink · © 2026\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { domain: 'swe' };\n\n  pick(id) {\n    this.setState({ domain: id }, () => {\n      const g = document.getElementById('projGrid');\n      if (g) { g.style.animation = 'none'; void g.offsetWidth; g.style.animation = 'gridfade .45s ease both'; }\n    });\n  }\n\n  renderVals() {\n    const overrides = {\n      amazonwebservices: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/amazonwebservices/amazonwebservices-original-wordmark.svg',\n      microsoftazure: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/azure/azure-original.svg',\n      css3: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg'\n    };\n    const ic = (slug) => (window.__resources && window.__resources['ic_'+slug]) || overrides[slug] || `https://cdn.simpleicons.org/${slug}`;\n    const grp = (title, emoji, items) => ({\n      title, emoji,\n      items: items.map(([name, slug]) => ({ name, slug, icon: ic(slug) }))\n    });\n\n    const skillGroups = [\n      grp('Languages', '💬', [\n        ['Python','python'],['Java','openjdk'],['C++','cplusplus'],['JavaScript','javascript'],\n        ['TypeScript','typescript'],['Rust','rust'],['Go','go'],['HTML','html5'],['CSS','css3']\n      ]),\n      grp('Frontend', '🎀', [\n        ['React','react'],['Next.js','nextdotjs'],['Tailwind CSS','tailwindcss'],\n        ['Bootstrap','bootstrap'],['Redux','redux'],['Vite','vite']\n      ]),\n      grp('Backend', '⚙️', [\n        ['Node.js','nodedotjs'],['Express.js','express'],['Django','django'],\n        ['Flask','flask'],['FastAPI','fastapi'],['Spring Boot','springboot']\n      ]),\n      grp('Databases', '🗂️', [\n        ['PostgreSQL','postgresql'],['MySQL','mysql'],['MongoDB','mongodb'],\n        ['SQLite','sqlite'],['Redis','redis'],['Firebase','firebase']\n      ]),\n      grp('Cloud & DevOps', '☁️', [\n        ['AWS','amazonwebservices'],['GCP','googlecloud'],['Azure','microsoftazure'],\n        ['Docker','docker'],['Kubernetes','kubernetes'],['GitHub Actions','githubactions'],\n        ['Terraform','terraform'],['Nginx','nginx']\n      ]),\n      grp('AI & Data Science', '🤖', [\n        ['TensorFlow','tensorflow'],['PyTorch','pytorch'],['Scikit-learn','scikitlearn'],\n        ['Hugging Face','huggingface'],['NumPy','numpy'],['Pandas','pandas']\n      ]),\n      grp('Embedded & IoT', '🔌', [\n        ['Arduino','arduino'],['ESP32','espressif'],['Raspberry Pi','raspberrypi'],['MQTT','mqtt']\n      ])\n    ];\n\n    const experience = [\n      { role:'Assistant Merchandiser', company:'Textnet Bangladesh · Full-time', period:'Feb 2024 — Now',\n        desc:'Manage end-to-end merchandising for textile orders — coordinating with buyers and production teams, tracking samples and shipments, and keeping costing, timelines, and quality in full bloom. 🌷' },\n      { role:'Industrial Engineering Intern', company:'Nestlé Bangladesh · Internship', period:'Jul 2025 — Jul 2025',\n        desc:'Studied production lines and process flows, supported time-and-motion and efficiency analysis, and helped identify lean improvements to reduce waste on the factory floor. 🌱' },\n      { role:'Industrial Engineering Intern', company:'Dan Foods Bangladesh · Internship', period:'Jun 2025 — Jul 2025',\n        desc:'Assisted the IE team with line balancing and capacity planning, collected and analysed production data, and proposed small workflow tweaks to boost output and quality. ✨' }\n    ];\n\n    const education = [\n      { emoji:'🎓', degree:'B.S. in Computer Science', school:'University of Waterloo', period:'2026 — 2031' },\n      { emoji:'📊', degree:'BBA (Business Administration)', school:'Wilfrid Laurier University', period:'2026 — 2031' }\n    ];\n\n    const projectsByDomain = {\n      swe: [\n        { emoji:'🦆', title:'duckdb-cost-optimizer', desc:'A query cost optimizer for DuckDB — smarter plan selection to make analytical queries run leaner and faster.', tags:['C++','DuckDB','Query Optimization'], live:'https://github.com/Isha-Das-06/duckdb-cost-optimizer', code:'https://github.com/Isha-Das-06/duckdb-cost-optimizer' },\n        { emoji:'🌐', title:'Geo-replicated CRDT Key-Value Store', desc:'A distributed key-value store using CRDTs for conflict-free, geo-replicated writes across regions.', tags:['Python','CRDTs','Distributed Systems'], live:'https://github.com/Isha-Das-06/Geo-replicated-CRDT-key-value-store', code:'https://github.com/Isha-Das-06/Geo-replicated-CRDT-key-value-store' },\n        { emoji:'⚡', title:'Replicated Matching Engine', desc:'A replicated order-matching engine with chaos-tested failover for resilience under real-world faults.', tags:['C++','Replication','Chaos Testing'], live:'https://github.com/Isha-Das-06/Replicated-matching-engine-with-chaos-tested-failover', code:'https://github.com/Isha-Das-06/Replicated-matching-engine-with-chaos-tested-failover' }\n      ],\n      frontend: 'upcoming',\n      backend: 'upcoming',\n      devops: 'upcoming',\n      security: 'upcoming',\n      aiml: [\n        { emoji:'🧠', title:'Mini Autograd Tensor Library', desc:'A tiny automatic-differentiation tensor library built from scratch — reverse-mode autograd and the core of a deep-learning framework.', tags:['Python','Autograd','Deep Learning'], code:'https://github.com/Isha-Das-06/A-mini-autograd-tensor-library-from-scratch-' },\n        { emoji:'⚡', title:'Multi-GPU LoRA / QLoRA Fine-Tuning Pipeline', desc:'A distributed fine-tuning pipeline for LLMs with LoRA/QLoRA and built-in throughput profiling across multiple GPUs.', tags:['PyTorch','LoRA','Multi-GPU'], code:'https://github.com/Isha-Das-06/Multi-GPU-LoRA-QLoRA-Fine-Tuning-Pipeline-with-Throughput-Profiling' },\n        { emoji:'🤖', title:'Custom LLM Inference Server', desc:'A from-scratch inference server for serving large language models with efficient request handling.', tags:['Python','LLM','Inference'], code:'https://github.com/Isha-Das-06/Custom-LLM-inference-server' }\n      ]\n    };\n\n    const domainMeta = [\n      { id:'swe', label:'Software Eng', emoji:'💻' },\n      { id:'frontend', label:'Frontend', emoji:'🎀' },\n      { id:'backend', label:'Backend', emoji:'⚙️' },\n      { id:'devops', label:'DevOps', emoji:'☁️' },\n      { id:'security', label:'Cybersecurity', emoji:'🔐' },\n      { id:'aiml', label:'AI / ML', emoji:'🤖' }\n    ];\n\n    const base = 'display:flex;align-items:center;gap:7px;border-radius:24px;cursor:pointer;font-family:Quicksand,sans-serif;font-weight:700;font-size:13.5px;padding:11px 20px;transition:transform .18s,box-shadow .2s,background .2s;';\n    const activeStyle = base + 'border:none;color:#fff;background:linear-gradient(135deg,#c41e6a,#8e1b5c);box-shadow:0 10px 22px rgba(196,30,106,.32);';\n    const idleStyle = base + 'border:1.5px solid #d999bd;color:#a01457;background:rgba(255,255,255,.85);';\n\n    const current = this.state.domain || 'swe';\n    const domains = domainMeta.map(d => ({\n      ...d,\n      tabStyle: d.id === current ? activeStyle : idleStyle,\n      onClick: () => this.pick(d.id)\n    }));\n\n    const entry = projectsByDomain[current];\n    const isUpcoming = entry === 'upcoming';\n    const currentLabel = (domainMeta.find(d => d.id === current) || {}).label || '';\n\n    return {\n      skillGroups, experience, education,\n      domains,\n      isUpcoming,\n      hasProjects: !isUpcoming,\n      currentLabel,\n      currentProjects: isUpcoming ? [] : entry\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
